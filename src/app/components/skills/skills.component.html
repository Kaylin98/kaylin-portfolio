<section id="skills" class="py-20">
  <div class="container mx-auto px-4">
    <div class="text-center mb-16">
      <h2 class="text-3xl lg:text-4xl mb-4">Skills & Technologies</h2>
      <p class="text-lg text-muted-foreground max-w-2xl mx-auto">
        A comprehensive toolkit for building modern web applications
      </p>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (category of skillCategories; track category.category) {
        <div appCard class="h-full">
          <div appCardHeader>
            <h3 appCardTitle class="text-center">{{ category.category }}</h3>
          </div>
          <div appCardContent>
            <div class="flex flex-wrap gap-2">
              @for (skill of category.skills; track skill) {
                <span appBadge variant="secondary" class="text-xs">{{ skill }}</span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
