<footer class="py-12 border-t">
  <div class="container mx-auto px-4">
    <div class="flex flex-col md:flex-row items-center justify-between gap-6">
      <div class="text-center md:text-left">
        <h3 class="text-lg mb-2">{{ config().name }}</h3>
        <p class="text-muted-foreground">Building the future, one line of code at a time.</p>
      </div>

      <div class="flex gap-2">
        <a appButton variant="ghost" size="sm" [href]="config().githubUrl" target="_blank" rel="noopener noreferrer">
          <app-github-icon class="h-5 w-5" />
        </a>
        <a appButton variant="ghost" size="sm" [href]="config().linkedinUrl" target="_blank" rel="noopener noreferrer">
          <app-linkedin-icon class="h-5 w-5" />
        </a>
        <a appButton variant="ghost" size="sm" [href]="'mailto:' + config().email">
          <svg lucideMail class="h-5 w-5"></svg>
        </a>
      </div>
    </div>

    <div class="mt-8 pt-8 border-t text-center text-muted-foreground">
      <p>&copy; {{ year }} {{ config().name }}. All rights reserved.</p>
    </div>
  </div>
</footer>
