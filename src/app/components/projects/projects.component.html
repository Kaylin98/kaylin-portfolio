<section id="projects" class="py-20 bg-muted/30">
  <div class="container mx-auto px-4">
    <div class="text-center mb-16">
      <h2 class="text-3xl lg:text-4xl mb-4">Featured Projects</h2>
      <p class="text-lg text-muted-foreground max-w-2xl mx-auto">
        A selection of projects that showcase my skills and problem-solving abilities
      </p>
    </div>

    <div class="grid lg:grid-cols-3 gap-8">
      @for (project of projects; track project.title) {
        <div appCard class="overflow-hidden group hover:shadow-lg transition-all duration-300">
          <div class="relative overflow-hidden">
            <app-image-with-fallback
              [src]="project.image"
              [alt]="project.title"
              className="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300"
            />
            <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          </div>

          <div appCardHeader>
            <h3 appCardTitle>{{ project.title }}</h3>
            <p appCardDescription>{{ project.description }}</p>
          </div>

          <div appCardContent class="pt-0">
            <div class="flex flex-wrap gap-2 mb-4">
              @for (tech of project.technologies; track tech) {
                <span appBadge variant="outline" class="text-xs">{{ tech }}</span>
              }
            </div>

            <div class="flex gap-2">
              <a appButton size="sm" variant="outline" [href]="project.githubUrl" target="_blank" rel="noopener noreferrer">
                <app-github-icon class="h-4 w-4 mr-2" />
                Code
              </a>
              <a appButton size="sm" [href]="project.liveUrl" target="_blank" rel="noopener noreferrer">
                <svg lucideExternalLink class="h-4 w-4 mr-2"></svg>
                Live Demo
              </a>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
