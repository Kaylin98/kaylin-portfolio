<section id="hero" class="min-h-screen flex items-center justify-center pt-20 pb-10">
  <div class="container mx-auto px-4">
    <div class="flex flex-col lg:flex-row items-center gap-12">
      <div class="flex-1 text-center lg:text-left">
        <h1 class="text-4xl lg:text-6xl mb-6">
          Hi, I'm <span class="text-primary">{{ config().name }}</span>
        </h1>
        <h2 class="text-xl lg:text-2xl text-muted-foreground mb-6">
          {{ config().role }}
        </h2>
        <p class="text-lg text-muted-foreground mb-8 max-w-2xl">
          Software engineer by trade, problem-solver by nature, and occasional debugger 
          of my own coffee-fueled decisions. Always learning, occasionally Googling, 
          and on an eternal quest to write code today that I won’t regret tomorrow.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start mb-8">
          <button appButton size="lg" (click)="scrollToSection('projects')">View My Work</button>
          <button appButton variant="outline" size="lg" (click)="scrollToSection('contact')">
            Get In Touch
          </button>
        </div>

        <div class="flex gap-4 justify-center lg:justify-start">
          <a appButton variant="ghost" size="sm" [href]="config().githubUrl" target="_blank" rel="noopener noreferrer">
            <app-github-icon class="h-5 w-5" />
          </a>
          <a appButton variant="ghost" size="sm" [href]="config().linkedinUrl" target="_blank" rel="noopener noreferrer">
            <app-linkedin-icon class="h-5 w-5" />
          </a>
          <a appButton variant="ghost" size="sm" [href]="'mailto:' + config().email">
            <svg lucideMail class="h-5 w-5"></svg>
          </a>
        </div>
      </div>

      <div class="flex-1 max-w-md">
        <div class="relative">
          <div class="w-80 h-80 mx-auto rounded-full overflow-hidden border-4 border-border">
            <app-image-with-fallback
              src="images/profile.png"
              alt="Kaylin Maharaj"
              className="w-full h-full object-cover"
            />
          </div>
          <div class="absolute -top-4 -right-4 w-24 h-24 bg-primary/10 rounded-full blur-xl"></div>
          <div class="absolute -bottom-4 -left-4 w-32 h-32 bg-secondary/20 rounded-full blur-xl"></div>
        </div>
      </div>
    </div>
  </div>
</section>
